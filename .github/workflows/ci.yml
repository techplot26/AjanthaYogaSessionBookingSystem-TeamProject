name: Ajantha Yoga Assignment 2 CI/CD

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

jobs:
  backend-ci:
    name: Backend CI - Test and Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      JWT_SECRET: test_secret
      PORT: 5001

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm install

      - name: Run backend unit tests
        run: npm test

      - name: Check backend build
        run: npm run build --if-present

  frontend-ci:
    name: Frontend CI - Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: CI=false npm run build

  deploy-to-ec2:
    name: Deploy to EC2
    runs-on: self-hosted
    needs:
      - backend-ci
      - frontend-ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy latest code to EC2
        run: |
          cd ~/AjanthaYogaSessionBookingSystem-TeamProject

          git checkout main
          git pull origin main

          cd backend
          npm install
          pm2 restart ajantha-team-backend || pm2 start server.js --name ajantha-team-backend

          cd ../frontend
          npm install
          CI=false npm run build

          sudo rm -rf /var/www/html/*
          sudo cp -r build/* /var/www/html/
          sudo systemctl restart nginx

          pm2 save